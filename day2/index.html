<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유현서 - Player Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        body: '#0a0a0a', card: '#121212', cardHover: '#1a1a1a',
                        textMain: '#ffffff', textDim: '#a3a3a3',
                        borderLight: '#333333', borderHighlight: '#555555',
                        excellent: '#4ade80', strong: '#dc2626', weak: '#facc15'
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans KR', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* 커스텀 전술 커서 적용 */
        body { cursor: crosshair; }
        .interactive:hover { cursor: pointer; }
    </style>
</head>
<body class="bg-body text-textMain font-sans min-h-screen flex flex-col">

    <nav class="fixed top-0 w-full bg-black border-b border-borderLight z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="text-textDim font-bold tracking-widest text-lg">SCOUTING REPORT</div>
        <ul class="flex gap-8 text-sm font-semibold tracking-wider">
            <li><a href="index.html" class="interactive text-textMain border-b-2 border-textMain pb-1">PROFILE</a></li>
            <li><a href="skills.html" class="interactive text-textDim hover:text-textMain transition">SKILLS</a></li>
            <li><a href="vision.html" class="interactive text-textDim hover:text-textMain transition">VISION</a></li>
        </ul>
    </nav>
    <div id="scroll-progress" class="fixed top-[60px] left-0 h-1 bg-excellent z-50 transition-all duration-100" style="width: 0%;"></div>

    <main class="mt-24 mb-12 max-w-4xl w-full mx-auto bg-card border border-borderLight rounded-lg overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.8)]">
        <header class="bg-black px-6 py-4 border-b border-borderLight flex justify-between">
            <div class="text-textDim font-bold tracking-widest">PLAYER OVERVIEW</div>
            <div class="text-textMain font-bold tracking-widest">I AM</div>
        </header>

        <section class="p-8">
            <div class="flex items-center gap-6 mb-8">
                <div class="w-28 h-28 rounded-lg border-2 border-borderLight overflow-hidden bg-black shrink-0 shadow-lg relative group interactive">
                    <img src="https://placehold.co/150x150/1a1a1a/ffffff?text=Photo" alt="Profile" class="w-full h-full object-cover grayscale transition duration-400 group-hover:grayscale-0 group-hover:scale-105">
                </div>
                <div>
                    <h1 class="text-3xl font-bold mb-1">유현서</h1>
                    <div class="text-textDim text-sm mb-3">Yoo Hyun-seo</div>
                    <div class="flex gap-2 flex-wrap">
                        <span class="text-textMain border border-textDim px-3 py-1 rounded text-xs font-semibold uppercase">SSAFY 16th</span>
                        <span class="text-textMain border border-textDim px-3 py-1 rounded text-xs font-semibold uppercase">Seoul 10th Class</span>
                    </div>
                </div>
            </div>

            <div class="border-t-2 border-borderLight pt-6 flex flex-col gap-4">
                <div class="flex border-b border-borderLight pb-4 items-center">
                    <div class="flex-1 text-textDim text-sm font-medium">신상 정보</div>
                    <div class="flex-[2] font-medium text-sm">2000.04.06 (만 26세)<br><span class="text-textDim text-xs">179cm / 85kg</span></div>
                </div>
                <div class="flex border-b border-borderLight pb-4 items-center">
                    <div class="flex-1 text-textDim text-sm font-medium">학력</div>
                    <div class="flex-[2] font-medium text-sm">한성대학교 컴퓨터공학부 졸업<br><span class="text-textDim text-xs">(GPA 3.52 / 4.5)</span></div>
                </div>
                <div class="flex border-b border-borderLight pb-4 items-center">
                    <div class="flex-1 text-textDim text-sm font-medium">포지션</div>
                    <div class="flex-[2] font-medium text-sm">서비스 기업 백엔드 개발자</div>
                </div>
                <div class="flex border-b border-borderLight pb-4 items-center">
                    <div class="flex-1 text-textDim text-sm font-medium">예상 몸값</div>
                    <div class="flex-[2] font-medium text-sm text-white">자유계약 (FA)<br><span class="text-textDim text-xs">(이적료 없음, 즉시 합류 가능)</span></div>
                </div>
                
                <div class="flex border-b border-borderLight pb-4 items-center">
                    <div class="flex-1 text-textDim text-sm font-medium">주력 도구 (양발)</div>
                    <div class="flex-[2]">
                        <div class="flex gap-6 items-center">
                            <div class="flex flex-col items-center gap-1 group interactive">
                                <span class="text-xs text-textDim font-bold group-hover:text-white transition">C++</span>
                                <svg viewBox="0 0 30 50" width="22" height="38"><path d="M15,5 C10,5 5,15 5,30 C5,40 10,48 18,48 C25,48 25,35 25,25 C25,12 22,5 15,5 Z" fill="var(--foot-weak)" stroke="#000" stroke-width="2"/></svg>
                                <span class="text-sm font-bold text-weak">15 <span class="text-[0.65rem] text-textDim font-normal">(서브/왼발)</span></span>
                            </div>
                            <div class="flex flex-col items-center gap-1 group interactive">
                                <span class="text-xs text-white font-bold">Java</span>
                                <svg viewBox="0 0 30 50" width="22" height="38"><path d="M15,5 C20,5 25,15 25,30 C25,40 20,48 12,48 C5,48 5,35 5,25 C5,12 8,5 15,5 Z" fill="var(--foot-strong)" stroke="#000" stroke-width="2"/></svg>
                                <span class="text-sm font-bold text-strong">20 <span class="text-[0.65rem] text-textDim font-normal">(메인/오른발)</span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 스크롤 진행률 표시 로직
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById('scroll-progress').style.width = scrolled + '%';
        });
    </script>
</body>
</html>
